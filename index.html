<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Mobile | Connect With Us</title>
  
  <script>
    if (localStorage.getItem('rj_theme') === 'light') { 
      document.documentElement.classList.add('light-theme'); 
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* =========================================================
       1. ROOT VARIABLES & THEME (Slate Palette)
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      /* Dark Theme (Default) */
      --bg-base: #0f172a; 
      --card-bg: #1e293b; 
      --card-border: #334155;
      
      --primary: #3b82f6; 
      --primary-hover: #2563eb; 
      --primary-alpha: rgba(59, 130, 246, 0.15);
      
      --text-main: #f8fafc; 
      --text-soft: #94a3b8;
      
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
    }

    html.light-theme {
      /* Light Theme */
      --bg-base: #f1f5f9; 
      --card-bg: #ffffff; 
      --card-border: #e2e8f0;
      
      --primary: #4f46e5; 
      --primary-hover: #4338ca; 
      --primary-alpha: rgba(79, 70, 229, 0.1);
      
      --text-main: #0f172a; 
      --text-soft: #64748b; 
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }
    
    html { -webkit-font-smoothing: antialiased; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 16px 64px;
      transition: background-color 0.3s ease, color 0.3s ease;
      position: relative;
    }

    h1, h2, h3, .brand-title { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Theme Toggle Button */
    .theme-toggle-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-soft);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .theme-toggle-btn:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* =========================================================
       2. HEADER SECTION
       ========================================================= */
    .header { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 32px; text-align: center; }
    
    .logo-container {
      width: 80px; height: 80px; 
      background: var(--card-bg); 
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md); 
      border: 1px solid var(--card-border);
      overflow: hidden; flex-shrink: 0;
      margin-bottom: 8px;
    }
    .logo-container img { width: 70%; height: 70%; object-fit: contain; }
    
    .headline { font-size: clamp(24px, 6vw, 32px); font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; line-height: 1.2; }
    .headline em { font-style: normal; color: var(--primary); }
    .subline { font-size: 15px; color: var(--text-soft); line-height: 1.6; max-width: 400px; font-weight: 500; }
    
    /* =========================================================
       3. LINKS CARD & BUTTONS
       ========================================================= */
    .links-card {
      background: var(--card-bg); 
      border-radius: var(--radius-xl);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
      width: 100%; max-width: 520px; 
      padding: 32px;
      display: flex; flex-direction: column; gap: 16px;
    }
    
    .social-action-btn {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base); 
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md); 
      padding: 16px 20px; 
      width: 100%; 
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }
    
    .social-action-btn:hover { 
        background: var(--card-bg); 
        border-color: var(--primary); 
        transform: translateY(-3px); 
        box-shadow: var(--shadow-md); 
    }
    .social-action-btn:active { transform: scale(0.98); }
    .social-action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; border-color: var(--card-border); }
    
    .social-info { display: flex; align-items: center; gap: 16px; }
    .social-icon {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      background: var(--primary-alpha); 
      display: flex; align-items: center; justify-content: center; color: var(--primary);
      flex-shrink: 0; transition: all 0.2s;
    }
    
    /* Brand-specific Hover Colors */
    .social-action-btn:hover .icon-whatsapp { background: rgba(37, 211, 102, 0.15); color: #25D366; }
    .social-action-btn:hover .icon-instagram { background: rgba(225, 48, 108, 0.15); color: #E1306C; }
    .social-action-btn:hover .icon-youtube { background: rgba(255, 0, 0, 0.15); color: #FF0000; }
    .social-action-btn:hover .icon-facebook { background: rgba(24, 119, 242, 0.15); color: #1877F2; }
    .social-action-btn:hover .icon-snapchat { background: rgba(255, 252, 0, 0.15); color: #FFFC00; }

    .btn-text-group { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
    .btn-title { font-size: 15px; font-weight: 700; color: var(--text-main); }
    .btn-subtitle { font-size: 13px; color: var(--text-soft); font-weight: 500; transition: color 0.2s; }
    
    .action-icon { color: var(--text-soft); transition: color 0.2s; }
    .social-action-btn:hover .action-icon { color: var(--primary); }
    
    /* =========================================================
       4. TOAST & FOOTER
       ========================================================= */
    #toast { 
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); 
        background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); 
        font-size: 14px; font-weight: 600; padding: 14px 24px; border-radius: var(--radius-lg); 
        opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        white-space: nowrap; z-index: 9999; box-shadow: var(--shadow-md); 
        display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .footer { margin-top: 40px; font-size: 13px; color: var(--text-soft); text-align: center; font-weight: 600; }

    @media (max-width: 480px) {
      body { padding: 32px 16px 52px; }
      .links-card { padding: 24px; border-radius: var(--radius-lg); }
      .social-action-btn { padding: 14px 16px; }
      .theme-toggle-btn { top: 16px; right: 16px; }
    }
  </style>
</head>

  <!-- Theme Toggle Logic -->
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light-theme');
      localStorage.setItem('rj_theme', isLight ? 'light' : 'dark');
    });
  </script>

  <!-- Firebase Analytics Tracking Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBsAsMlKJqoyOS27IVotwszVvO1ZFCGABs",
      authDomain: "staff-review-935f3.firebaseapp.com",
      projectId: "staff-review-935f3",
      storageBucket: "staff-review-935f3.firebasestorage.app",
      messagingSenderId: "91819642184",
      appId: "1:91819642184:web:9b78814e6efcfb811a608d"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const staffName = urlParams.get('staff') || 'Direct/Unknown';
    let toastTimer;

    // Toast Notification Handler
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Single Tracking Engine: Logs click securely to Firebase Firestore
    async function sendTrackingData(platformName) {
      const storageKey = 'social_tapped_' + platformName.toLowerCase();
      
      // Keep local storage logic to prevent single users from spamming the analytics DB
      if (localStorage.getItem(storageKey)) {
        console.log("Returning visitor for " + platformName + ". Firebase logging skipped to prevent duplicates.");
        return; 
      }

      try {
        await addDoc(collection(db, "social_clicks"), {
          staff_name: staffName,
          platform: platformName,
          created_at: serverTimestamp()
        });
        localStorage.setItem(storageKey, 'true');
      } catch (err) {
        console.error("Firebase logging failed:", err);
      }
    }

    // Handle button clicks
    function handleSocialClick(btn, platform, url) {
      const allBtns = document.querySelectorAll('.social-action-btn');
      allBtns.forEach(b => b.disabled = true);

      const titleEl = btn.querySelector('.btn-title');
      const originalText = titleEl.textContent;
      
      // Visual feedback matching the new Slate variables
      titleEl.textContent = 'Opening...';
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = 'var(--primary-alpha)';
      
      showToast('Opening ' + platform + '...');
      
      sendTrackingData(platform);
      
      setTimeout(() => {
        window.open(url, '_blank', 'noopener,noreferrer');
        setTimeout(() => {
          titleEl.textContent = originalText;
          btn.style.borderColor = '';
          btn.style.background = '';
          allBtns.forEach(b => b.disabled = false);
        }, 800);
      }, 500);
    }

    // Bind event listeners to HTML elements
    document.querySelectorAll('.social-action-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const platform = btn.getAttribute('data-platform');
        const url = btn.getAttribute('data-url');
        handleSocialClick(btn, platform, url);
      });
    });
  </script>
