<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Mobile — Social Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- External Libraries for PDF, Charts, and DatePicker -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-hover: #60A5FA;
      --surface: #0D1117; --white: #161C27;
      --border: #2A3347; --text: #E8EDF5;
      --text-soft: #9BAAC4; --green: #34D399;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: var(--surface);
      color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 16px;
    }
    
    /* Login Screen */
    #login-screen {
      background: var(--white); padding: 40px; border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center;
      width: 100%; max-width: 400px; margin-top: 10vh; border: 1px solid var(--border);
    }
    #login-screen .brand-login { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
    #login-screen h2 { font-weight: 800; font-size: 24px; }
    #login-screen p { color: var(--text-soft); font-size: 14px; margin-bottom: 24px; }
    .input-field {
      width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none;
    }
    .input-field:focus { border-color: var(--blue); }
    .checkbox-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 13px; color: var(--text-soft); cursor: pointer; }
    #login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--blue); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    #login-btn:hover { background: var(--blue-hover); }
    #error-msg { color: #EF4444; font-size: 13px; margin-top: 12px; display: none; }

    /* Dashboard Layout */
    #dashboard { display: none; width: 100%; max-width: 1000px; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    
    .brand-text { display: flex; flex-direction: column; }
    .brand-text .name { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; line-height: 1.1; }
    .brand-text .tag { font-size: 12px; font-weight: 600; color: var(--blue-hover); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* Buttons */
    .header-btns { display: flex; gap: 10px; flex-wrap: wrap;}
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .btn-secondary:hover { border-color: var(--blue); }
    .btn-primary { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.4); color: var(--blue-hover); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .btn-primary:hover { background: var(--blue); color: white; }

    /* Metrics & Charts */
    .metrics-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .metric-card { flex: 1; min-width: 180px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .metric-title { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 6px; }
    .metric-value { font-size: 20px; font-weight: 800; color: var(--blue-hover); }
    
    .chart-container { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .chart-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-soft); margin-bottom: 16px; letter-spacing: 0.05em; }

    /* Filters */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; background: var(--white); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
    .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; }
    .filter-group label { font-size: 12px; color: var(--text-soft); font-weight: 600; text-transform: uppercase; }
    .filter-input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .filter-input:focus { border-color: var(--blue); }

    /* Table */
    .stats-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid var(--border); }
    th { background: rgba(59,130,246,0.1); color: var(--blue-hover); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
    td { font-size: 15px; }
    tr:last-child td { border-bottom: none; }
    .empty-row { text-align: center; color: var(--text-soft); font-style: italic; padding: 24px !important; }

    /* Load More */
    .load-more-container { text-align: center; margin-bottom: 40px; }
    #load-more-btn { display: none; margin: 0 auto; }
  </style>
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-screen">
    <div class="brand-login">
      <h2>RJ Mobile</h2>
    </div>
    <p>Social Analytics Portal</p>
    <input type="email" id="email-input" class="input-field" placeholder="Admin Email" />
    <input type="password" id="password-input" class="input-field" placeholder="Password" />
    <label class="checkbox-row">
      <input type="checkbox" id="remember-me" checked>
      Keep me logged in
    </label>
    <button id="login-btn">Secure Login</button>
    <div id="error-msg">Authentication failed. Check email and password.</div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard">
    <div class="header">
      <div class="brand-text">
        <div class="name">RJ Mobile</div>
        <div class="tag">Social Analytics Dashboard</div>
      </div>
      <div class="header-btns">
        <button id="export-pdf-btn" class="btn-primary">Export PDF</button>
        <button id="export-csv-btn" class="btn-primary">Export CSV</button>
        <button id="refresh-btn" class="btn-secondary">Refresh Data</button>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-title">Filtered Clicks</div>
        <div class="metric-value" id="metric-total">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Top Performing Staff</div>
        <div class="metric-value" id="metric-staff">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Top Platform</div>
        <div class="metric-value" id="metric-platform">-</div>
      </div>
    </div>

    <!-- Visual Chart -->
    <div class="chart-container">
      <div class="chart-title">Clicks by Platform</div>
      <canvas id="platformChart" style="max-height: 250px;"></canvas>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>View Mode</label>
        <select id="view-mode" class="filter-input">
          <option value="list">Detailed List</option>
          <option value="platform">Group by Platform</option>
          <option value="staff">Group by Staff</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Staff Name</label>
        <input list="staff-options" id="filter-staff" class="filter-input" placeholder="Search staff...">
        <datalist id="staff-options"></datalist>
      </div>
      <div class="filter-group">
        <label>Platform</label>
        <select id="filter-platform" class="filter-input">
          <option value="">All Platforms</option>
          <option value="Instagram">Instagram</option>
          <option value="YouTube">YouTube</option>
          <option value="Facebook">Facebook</option>
          <option value="Snapchat">Snapchat</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Start Date</label>
        <input type="text" id="filter-start" class="filter-input" placeholder="dd/mm/yyyy">
      </div>
      <div class="filter-group">
        <label>End Date</label>
        <input type="text" id="filter-end" class="filter-input" placeholder="dd/mm/yyyy">
      </div>
    </div>
    
    <!-- Data Table -->
    <div class="stats-card" id="table-container-for-pdf">
      <div id="pdf-header" style="display:none; padding:20px 16px; border-bottom: 1px solid #ccc; margin-bottom: 10px;">
        <h2 style="color:#1e3060; font-family:sans-serif; font-weight:800; margin:0;">RJ Mobile</h2>
        <p style="color:#666; font-family:sans-serif; margin:4px 0 0 0; font-size:14px;">Social Analytics Report</p>
      </div>
      <table>
        <thead id="table-head"><tr><th>Staff Name</th><th>Platform</th><th>Date & Time</th></tr></thead>
        <tbody id="table-body">
          <tr><td colspan="3" class="empty-row">Authenticate to view data...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="load-more-container">
      <button id="load-more-btn" class="btn-secondary">Load More Data</button>
    </div>
  </div>

  <!-- Firebase & Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsAsMlKJqoyOS27IVotwszVvO1ZFCGABs",
      authDomain: "staff-review-935f3.firebaseapp.com",
      projectId: "staff-review-935f3",
      storageBucket: "staff-review-935f3.firebasestorage.app",
      messagingSenderId: "91819642184",
      appId: "1:91819642184:web:9b78814e6efcfb811a608d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let allClicksData = [];
    let chartInstance = null;
    let lastVisibleDoc = null;
    let isFetching = false;

    // Attach Event Listeners to remove inline JS
    document.getElementById('password-input').addEventListener('keypress', (event) => {
      if(event.key === 'Enter') document.getElementById('login-btn').click();
    });
    document.getElementById('view-mode').addEventListener('change', applyFilters);
    document.getElementById('filter-staff').addEventListener('input', applyFilters);
    document.getElementById('filter-platform').addEventListener('change', applyFilters);
    
    flatpickr("#filter-start", { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", onChange: () => applyFilters() });
    flatpickr("#filter-end", { dateFormat: "Y-m-d", altInput: true, altFormat: "d/m/Y", onChange: () => applyFilters() });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadStats(false);
      } else {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email-input').value;
      const password = document.getElementById('password-input').value;
      const remember = document.getElementById('remember-me').checked;
      const errorMsg = document.getElementById('error-msg');
      
      const persistenceType = remember ? browserLocalPersistence : browserSessionPersistence;
      
      try {
        errorMsg.style.display = 'none';
        await setPersistence(auth, persistenceType);
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = error.message; 
        console.error("Auth Error:", error.message);
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => { signOut(auth); });
    document.getElementById('refresh-btn').addEventListener('click', () => loadStats(false));
    document.getElementById('load-more-btn').addEventListener('click', () => loadStats(true));

    async function loadStats(loadMore = false) {
      if (isFetching) return;
      isFetching = true;

      const tbody = document.getElementById('table-body');
      const loadMoreBtn = document.getElementById('load-more-btn');
      
      if (!loadMore) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-row">Fetching secure data...</td></tr>';
        allClicksData = [];
        lastVisibleDoc = null;
      } else {
        loadMoreBtn.innerText = 'Loading...';
        loadMoreBtn.disabled = true;
      }
      
      try {
        let q;
        const fetchLimit = 1000;
        if (loadMore && lastVisibleDoc) {
          q = query(collection(db, "social_clicks"), orderBy("created_at", "desc"), startAfter(lastVisibleDoc), limit(fetchLimit));
        } else {
          q = query(collection(db, "social_clicks"), orderBy("created_at", "desc"), limit(fetchLimit));
        }

        const snapshot = await getDocs(q);
        
        if (!snapshot.empty) {
          lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];
          snapshot.forEach((doc) => { 
            let itemData = doc.data();
            if (itemData.staff_name) { itemData.staff_name = itemData.staff_name.replace(/-/g, ' '); }
            allClicksData.push(itemData); 
          });
        }

        if (snapshot.docs.length < fetchLimit) {
          loadMoreBtn.style.display = 'none';
        } else {
          loadMoreBtn.style.display = 'block';
          loadMoreBtn.innerText = 'Load More Data';
          loadMoreBtn.disabled = false;
        }

        populateStaffDropdown(allClicksData);
        applyFilters(); 
      } catch (error) {
        console.error("Error loading stats:", error);
        if (!loadMore) {
          tbody.innerHTML = '<tr><td colspan="3" style="color:#EF4444; text-align:center;">Failed to load data. Ensure Firestore Rules are set securely.</td></tr>';
        }
      } finally {
        isFetching = false;
      }
    }

    function populateStaffDropdown(data) {
      const uniqueStaff = [...new Set(data.map(item => item.staff_name))].sort();
      const dataList = document.getElementById('staff-options');
      dataList.innerHTML = ''; 
      uniqueStaff.forEach(staff => {
        if(staff && staff !== 'Direct/Unknown') { 
          const option = document.createElement('option');
          option.value = staff;
          dataList.appendChild(option);
        }
      });
    }

    function formatToCustomDate(firebaseTimestamp) {
      if (!firebaseTimestamp) return "N/A";
      const date = firebaseTimestamp.toDate();
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0'); 
      const year = date.getFullYear();
      let hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12; hours = hours ? hours : 12; 
      return `${day}/${month}/${year}, ${hours}:${minutes} ${ampm}`;
    }

    function updateDashboardUI(dataArray) {
      const tbody = document.getElementById('table-body');
      const thead = document.getElementById('table-head');
      const mode = document.getElementById('view-mode').value;
      
      tbody.innerHTML = ''; 
      document.getElementById('metric-total').innerText = dataArray.length;

      if (dataArray.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-row">No clicks match your filters.</td></tr>';
        document.getElementById('metric-staff').innerText = "-";
        document.getElementById('metric-platform').innerText = "-";
        updateChart({}); 
        return;
      }

      if (mode === 'list') {
        thead.innerHTML = '<tr><th>Staff Name</th><th>Platform</th><th>Date & Time</th></tr>';
        dataArray.forEach((data) => {
          const row = document.createElement('tr');
          row.innerHTML = `<td><strong>${data.staff_name || "Unknown"}</strong></td><td>${data.platform || "Unknown"}</td><td>${formatToCustomDate(data.created_at)}</td>`;
          tbody.appendChild(row);
        });
      } 
      else if (mode === 'platform') {
        thead.innerHTML = '<tr><th>Platform</th><th>Total Clicks</th></tr>';
        const counts = dataArray.reduce((acc, curr) => {
          const plat = curr.platform || "Unknown";
          acc[plat] = (acc[plat] || 0) + 1;
          return acc;
        }, {});
        
        Object.entries(counts).forEach(([name, count]) => {
          const row = document.createElement('tr');
          row.innerHTML = `<td><strong>${name}</strong></td><td>${count}</td>`;
          tbody.appendChild(row);
        });
      }
      else if (mode === 'staff') {
        thead.innerHTML = '<tr><th>Staff Name</th><th>Total Clicks</th></tr>';
        const counts = dataArray.reduce((acc, curr) => {
          const staff = curr.staff_name || "Unknown";
          acc[staff] = (acc[staff] || 0) + 1;
          return acc;
        }, {});
        
        Object.entries(counts).forEach(([name, count]) => {
          const row = document.createElement('tr');
          row.innerHTML = `<td><strong>${name}</strong></td><td>${count}</td>`;
          tbody.appendChild(row);
        });
      }

      const staffCounts = {};
      const platformCounts = {};
      dataArray.forEach((data) => {
        if(data.staff_name && data.staff_name !== 'Direct/Unknown') staffCounts[data.staff_name] = (staffCounts[data.staff_name] || 0) + 1;
        if(data.platform) platformCounts[data.platform] = (platformCounts[data.platform] || 0) + 1;
      });

      const topStaff = Object.keys(staffCounts).sort((a,b) => staffCounts[b] - staffCounts[a])[0] || "-";
      const topPlatform = Object.keys(platformCounts).sort((a,b) => platformCounts[b] - platformCounts[a])[0] || "-";
      
      document.getElementById('metric-staff').innerText = topStaff;
      document.getElementById('metric-platform').innerText = topPlatform;
      
      updateChart(platformCounts);
    }

    function updateChart(platformData) {
      const ctx = document.getElementById('platformChart').getContext('2d');
      if (chartInstance) { chartInstance.destroy(); }
      
      Chart.defaults.color = '#9BAAC4';
      Chart.defaults.borderColor = '#2A3347';

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Object.keys(platformData),
          datasets: [{
            label: 'Total Clicks',
            data: Object.values(platformData),
            backgroundColor: '#3B82F6',
            borderRadius: 6,
            hoverBackgroundColor: '#60A5FA'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
      });
    }

    function applyFilters() {
      const staffQuery = document.getElementById('filter-staff').value.toLowerCase();
      const platformQuery = document.getElementById('filter-platform').value;
      const startDateQuery = document.getElementById('filter-start').value;
      const endDateQuery = document.getElementById('filter-end').value;

      const filteredData = allClicksData.filter(item => {
        let isMatch = true;
        if (staffQuery && item.staff_name && !item.staff_name.toLowerCase().includes(staffQuery)) isMatch = false;
        if (platformQuery && item.platform !== platformQuery) isMatch = false;
        if (item.created_at) {
          const itemDate = item.created_at.toDate();
          if (startDateQuery) {
            if (itemDate < new Date(startDateQuery)) isMatch = false;
          }
          if (endDateQuery) {
            const endDate = new Date(endDateQuery);
            endDate.setTime(endDate.getTime() + 86400000); 
            if (itemDate >= endDate) isMatch = false;
          }
        }
        return isMatch;
      });
      updateDashboardUI(filteredData);
    }

    document.getElementById('export-csv-btn').addEventListener('click', () => {
      let csvContent = "data:text/csv;charset=utf-8,";
      
      const headers = Array.from(document.querySelectorAll("#table-head th")).map(th => th.innerText).join(",");
      csvContent += headers + "\n";
      
      document.querySelectorAll("#table-body tr").forEach(row => {
        const rowData = Array.from(row.cells).map(cell => cell.innerText.replace(/,/g, '')).join(",");
        csvContent += rowData + "\n";
      });
      
      const link = document.createElement("a");
      link.setAttribute("href", encodeURI(csvContent));
      link.setAttribute("download", "RJ_Social_Analytics.csv");
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });

    document.getElementById('export-pdf-btn').addEventListener('click', () => {
      const element = document.getElementById('table-container-for-pdf');
      const pdfHeader = document.getElementById('pdf-header');
      pdfHeader.style.display = 'block';
      element.style.background = '#ffffff'; element.style.color = '#000000'; 
      
      html2pdf().set({
        margin: 10, filename: 'RJ_Social_Analytics.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(element).save().then(() => {
        pdfHeader.style.display = 'none';
        element.style.background = 'var(--white)'; element.style.color = 'var(--text)';
      });
    });
  </script>
</body>
</html>
